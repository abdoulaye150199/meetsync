stages:
  - install
  - test
  - build
  - docker
  - deployer

variables:
  NODE_IMAGE: node:22-alpine
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  DOCKER_TLS_CERTDIR: "/certs"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

install:
  stage: install
  image: $NODE_IMAGE
  script:
    - npm ci --cache .npm --prefer-offline
  artifacts:
    expire_in: 1 week
    paths:
      - node_modules/
      - package-lock.json

test:
  stage: test
  image: $NODE_IMAGE
  dependencies:
    - install
  script:
    - npm run lint

build:
  stage: build
  image: $NODE_IMAGE
  dependencies:
    - install
  script:
    - npm run build
  artifacts:
    expire_in: 1 week
    paths:
      - dist/

docker:
  stage: docker
  image: docker:27.5.1
  services:
    - docker:27.5.1-dind
  script:
    - docker build -t "$DOCKER_IMAGE" .
    - |
      if [ -n "$CI_REGISTRY" ] && [ -n "$CI_REGISTRY_USER" ] && [ -n "$CI_REGISTRY_PASSWORD" ]; then
        echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
        docker push "$DOCKER_IMAGE"
        if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
          docker tag "$DOCKER_IMAGE" "$CI_REGISTRY_IMAGE:latest"
          docker push "$CI_REGISTRY_IMAGE:latest"
        fi
      else
        echo "CI registry variables are not available, image built locally only."
      fi

deploy:
  stage: deployer
  image: $NODE_IMAGE
  dependencies:
    - build
  script:
    - mkdir -p public
    - cp -r dist/* public/
  artifacts:
    paths:
      - public
  pages: true
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
