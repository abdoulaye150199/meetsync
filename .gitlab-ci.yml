image: node:22-alpine

stages:
  - quality
  - build

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

default:
  before_script:
    - npm ci --cache .npm --prefer-offline

lint:
  stage: quality
  script:
    - npm run lint

build:
  stage: build
  script:
    - npm run build
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - dist/
